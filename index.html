<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Array</title>
</head>

<body>
    <h1>🍕 My Favourite Foods 🍔</h1>

    <div class="card-container" id="foodContainer"></div>

    <script>
        const foods = [
            { name: "Pizza", image: "./images/pizza.jpg" },
            { name: "Burger", image: "./images/burger.jpg" },
            { name: "Pasta", image: "./images/pasta.jpg" },
            { name: "Ice Cream", image: "./images/ice-cream.jpg" },
            { name: "Sushi", image: "./images/sushi.jpg" }
        ];

        const container = document.getElementById("foodContainer");

        foods.forEach(food => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${food.image}" alt="${food.name}">
                <h3>${food.name}</h3>
            `;
            container.appendChild(card);
        });
    </script>

</body>

</html>
