<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourite Food</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9d1d1;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            border-radius: 20px;
            background-color: rgb(252, 238, 220);
            padding: 5px;
            width: fit-content;
            translate: 115%;

        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;

        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgb(252, 238, 220);
            height: 400px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 200px;
            height: 350px;
            border-radius: 8px;
            object-fit: cover;
            border-radius: 12px;
        }

        .card h3 {
            padding-top: 10px;
            margin: 10px 0;
            color: #444;
        }
    </style>
</head>

<body>
    <h1>🍕 My Favourite Foods 🍔</h1>

    <div class="card-container" id="foodContainer"></div>

    <script>
        const foods = [
            { name: "Pizza", image: "./images/pizza.jpg" },
            { name: "Burger", image: "./images/burger.jpg" },
            { name: "Pasta", image: "./images/pasta.jpg" },
            { name: "Ice Cream", image: "./images/ice-cream.jpg" },
            { name: "Sushi", image: "./images/sushi.jpg" }
        ];

        const container = document.getElementById("foodContainer");

        foods.forEach(food => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${food.image}" alt="${food.name}">
                <h3>${food.name}</h3>
            `;
            container.appendChild(card);
        });
    </script>

</body>

</html>
